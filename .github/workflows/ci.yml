name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff
        run: ruff check backend/ dashboard/ shared/

      - name: Pytest
        env:
          ENV: development
          API_KEY: test-api-key-for-ci-only-32chars
          DB_DSN: postgresql://test:test@localhost:5432/test
        run: PYTHONPATH=backend:. pytest tests/ -v --tb=short

      - name: Secret scan (gitleaks)
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner --exit-code 1
