services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: feedback-classifier-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/backend:/app
    working_dir: /app/backend
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: feedback-classifier-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/backend:/app
    working_dir: /app/backend
    command: python worker.py
    depends_on:
      - api

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: feedback-classifier-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - FASTAPI_URL=http://api:8000
    depends_on:
      - api

  n8n:
    image: n8nio/n8n:latest
    container_name: feedback-classifier-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5679/}
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_EXPRESSIONS_ALLOWED_ENV_VARS=API_KEY,FASTAPI_INGEST_URL
      - FASTAPI_INGEST_URL=http://host.docker.internal:8000/ingest
    env_file:
      - .env
    depends_on:
      - api

volumes:
  n8n_data:
